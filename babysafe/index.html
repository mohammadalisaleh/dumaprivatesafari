<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BabySafe+ Spin & Win!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A3A6B;
    --navy-light: #2a5298;
    --yellow: #F9C200;
    --yellow-dark: #e0ab00;
    --sky: #C5DFF0;
    --sky-light: #E8F4FC;
    --white: #FFFFFF;
    --green: #4a9e7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #daeef9 0%, #b8d9f0 40%, #cce8f5 100%);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Bubbles */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
    border: 1.5px solid rgba(255,255,255,0.5);
    pointer-events: none;
    animation: floatBubble linear infinite;
  }
  @keyframes floatBubble {
    0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-15vh) scale(1); opacity: 0; }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    z-index: 10;
    position: relative;
  }
  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .logo-leaf {
    font-size: 28px;
  }
  .logo-text {
    font-family: 'Baloo 2', cursive;
    font-size: 28px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.5px;
  }
  .logo-plus {
    font-size: 14px;
    color: var(--green);
    vertical-align: super;
    font-weight: 700;
  }
  .tagline {
    font-size: 15px;
    color: var(--navy);
    font-weight: 600;
    opacity: 0.75;
  }

  /* Main layout */
  .main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 10;
    position: relative;
    flex-wrap: wrap;
    padding: 0 16px;
  }

  /* Wheel container */
  .wheel-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wheel-glow {
    position: absolute;
    width: 110%;
    height: 110%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,194,0,0.25) 0%, transparent 70%);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  #wheelCanvas {
    display: block;
    filter: drop-shadow(0 8px 32px rgba(26,58,107,0.25));
    border-radius: 50%;
  }

  /* Pointer */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 40px solid var(--navy);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
    z-index: 20;
  }


  /* Center button */
  .spin-btn {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--yellow), var(--yellow-dark));
    border: 4px solid var(--navy);
    color: var(--navy);
    font-family: 'Baloo 2', cursive;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(249,194,0,0.5), 0 2px 4px rgba(0,0,0,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    letter-spacing: 0.3px;
    line-height: 1.1;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .spin-btn:active {
    transform: scale(0.93);
    box-shadow: 0 2px 8px rgba(249,194,0,0.4);
  }
  .spin-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }
  .spin-btn .spin-icon { font-size: 18px; }

  /* Side panel */
  .side-panel {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 2px solid rgba(255,255,255,0.8);
    padding: 24px 20px;
    max-width: 240px;
    box-shadow: 0 8px 32px rgba(26,58,107,0.12);
    text-align: center;
  }
  .side-panel h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .side-panel p {
    font-size: 13px;
    color: var(--navy);
    opacity: 0.7;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .prizes-list {
    list-style: none;
    text-align: left;
  }
  .prizes-list li {
    font-size: 12px;
    color: var(--navy);
    font-weight: 600;
    padding: 5px 8px;
    margin-bottom: 4px;
    background: rgba(26,58,107,0.06);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .prizes-list li .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 58, 107, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .modal-card {
    background: white;
    border-radius: 32px;
    padding: 40px 36px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    transform: scale(0.8) translateY(30px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
  }
  .modal-overlay.active .modal-card {
    transform: scale(1) translateY(0);
  }
  .modal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--navy), var(--yellow), var(--navy));
  }
  .modal-emoji {
    font-size: 64px;
    margin-bottom: 12px;
    display: block;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  @keyframes bounceIn {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .modal-title {
    font-family: 'Baloo 2', cursive;
    font-size: 16px;
    color: var(--navy);
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .modal-prize {
    font-family: 'Baloo 2', cursive;
    font-size: 30px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 20px;
  }
  .modal-prize.consolation {
    color: #888;
    font-size: 24px;
  }
  .modal-sub {
    font-size: 14px;
    color: #666;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .modal-btn {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(26,58,107,0.3);
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { transform: scale(0.96); }
  .modal-confetti {
    position: absolute;
    pointer-events: none;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: confettiFall 1.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
  }

  /* Responsive for iPad */
  @media (max-width: 900px) {
    .side-panel { display: none; }
    .main { gap: 0; }
  }
  @media (max-height: 700px) {
    .header { margin-bottom: 6px; }
    .logo-text { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- Floating bubbles -->
<script>
  (function() {
    const sizes = [40, 60, 80, 50, 35, 70, 45, 55, 90, 30];
    const delays = [0, 2, 4, 6, 1, 3, 5, 7, 9, 8];
    const durations = [12, 15, 18, 14, 20, 16, 13, 17, 11, 19];
    const lefts = [5, 15, 25, 35, 45, 55, 65, 75, 85, 92];
    sizes.forEach((size, i) => {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.style.cssText = `width:${size}px;height:${size}px;left:${lefts[i]}%;animation-duration:${durations[i]}s;animation-delay:${delays[i]}s;`;
      document.body.appendChild(b);
    });
  })();
</script>

<div class="header">
  <div class="logo-area">
    <span class="logo-leaf">🌿</span>
    <span class="logo-text">babysafe<span class="logo-plus">+</span></span>
  </div>
  <div class="tagline">Gentle by Nature, Non-Toxic by Choice 🍃</div>
</div>

<div class="main">
  <div class="side-panel">
    <h2>🎁 Prizes</h2>
    <p>Tap SPIN and see what you win today!</p>
    <ul class="prizes-list" id="prizesList"></ul>
  </div>

  <div class="wheel-wrapper">
    <div class="wheel-glow"></div>
    <div class="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
      <span class="spin-icon">✨</span>
      SPIN!
    </button>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="modal-confetti" id="confettiContainer"></div>
    <span class="modal-emoji" id="modalEmoji">🎉</span>
    <div class="modal-title" id="modalTitle">You Won!</div>
    <div class="modal-prize" id="modalPrize">10% Off!</div>
    <div class="modal-sub" id="modalSub">Show this screen to our team to claim your prize 🎀</div>
    <button class="modal-btn" onclick="closeModal()">Spin Again!</button>
  </div>
</div>

<script>
const SEGMENTS = [
  { label: "5% Off\nLotion",            short: "5% Off Lotion",                        emoji: "🧴", type: "win" },
  { label: "5% Off\nSoap",              short: "5% Off Soap",                           emoji: "🫧", type: "win" },
  { label: "10% Off\nLotion",           short: "10% Off Lotion",                        emoji: "🧴", type: "win" },
  { label: "10% Off\nSoap",             short: "10% Off Soap",                          emoji: "🧼", type: "win" },
  { label: "10% Off\nAny Product",      short: "10% Off Any Product",                   emoji: "🎉", type: "win" },
  { label: "Buy Lotion\nGet 10% Off\nSoap",   short: "Buy Lotion, Get 10% Off Soap",   emoji: "🎁", type: "win" },
  { label: "Buy Soap\nGet 10% Off\nLotion",   short: "Buy Soap, Get 10% Off Lotion",   emoji: "🎁", type: "win" },
  { label: "Bundle Deal!\nLotion + Soap\nTZS 20,000/-", short: "Bundle Deal: Lotion + Soap for TZS 20,000/- only", emoji: "🛍️", type: "win" },
  { label: "Spin\nAgain!",              short: "Spin Again!",                            emoji: "🔄", type: "again" },
  { label: "Better Luck\nNext Time!",   short: "Better Luck Next Time!",                emoji: "😊", type: "loss" },
];

// Color palette alternating
const COLORS = [
  "#1A3A6B", "#F9C200",
  "#2a5298", "#F9C200",
  "#1A3A6B", "#F9C200",
  "#2a5298", "#F9C200",
  "#4a9e7a", "#C5DFF0",
];
const TEXT_COLORS = [
  "#FFFFFF", "#1A3A6B",
  "#FFFFFF", "#1A3A6B",
  "#FFFFFF", "#1A3A6B",
  "#FFFFFF", "#1A3A6B",
  "#FFFFFF", "#1A3A6B",
];

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

// iPad sizing: make wheel fit nicely
function getWheelSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const maxFromH = vh * 0.72;
  const maxFromW = vw * 0.82;
  return Math.min(maxFromH, maxFromW, 520);
}

let SIZE = getWheelSize();
canvas.width = SIZE;
canvas.height = SIZE;
const R = SIZE / 2;
const CENTER = R;

const NUM = SEGMENTS.length;
const ARC = (2 * Math.PI) / NUM;

let currentAngle = 0;
let spinning = false;

function drawWheel(angle) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Outer ring shadow
  ctx.save();
  ctx.shadowColor = 'rgba(26,58,107,0.3)';
  ctx.shadowBlur = 24;
  ctx.beginPath();
  ctx.arc(CENTER, CENTER, R - 4, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();

  // Segments
  for (let i = 0; i < NUM; i++) {
    const startAngle = angle + i * ARC;
    const endAngle = startAngle + ARC;
    const mid = startAngle + ARC / 2;

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(CENTER, CENTER);
    ctx.arc(CENTER, CENTER, R - 6, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i];
    ctx.fill();

    // Subtle border
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(CENTER, CENTER);
    ctx.rotate(mid);
    ctx.textAlign = 'right';
    ctx.fillStyle = TEXT_COLORS[i];

    const lines = SEGMENTS[i].label.split('\n');
    const lineH = SIZE < 400 ? 12 : 14;
    const totalH = lines.length * lineH;
    const startY = -totalH / 2 + lineH * 0.5;
    const fontSz = SIZE < 400 ? 11 : (lines.length > 2 ? 11 : 13);

    ctx.font = `800 ${fontSz}px 'Nunito', sans-serif`;
    lines.forEach((line, li) => {
      ctx.fillText(line, R - 20, startY + li * lineH);
    });
    ctx.restore();
  }

  // Outer border ring
  ctx.beginPath();
  ctx.arc(CENTER, CENTER, R - 5, 0, 2 * Math.PI);
  ctx.strokeStyle = '#1A3A6B';
  ctx.lineWidth = 5;
  ctx.stroke();

  // Inner circle for button area
  ctx.beginPath();
  ctx.arc(CENTER, CENTER, 46, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#1A3A6B';
  ctx.lineWidth = 3;
  ctx.stroke();
}

drawWheel(currentAngle);

// Build prizes list
const list = document.getElementById('prizesList');
SEGMENTS.forEach((s, i) => {
  const li = document.createElement('li');
  li.innerHTML = `<span class="dot" style="background:${COLORS[i]}"></span>${s.short}`;
  list.appendChild(li);
});

// Spin logic
let targetAngle = 0;

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Pick a random winning segment (weighted — reduce "loss" chance)
  // Pointer is at top (angle = -PI/2), segments are drawn clockwise
  // We want to land segment index `winner` under the pointer
  const winner = Math.floor(Math.random() * NUM);

  // Full rotations + land on winner
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  // Segment center for winner: the pointer is at -PI/2
  // The winner's center should be at the top = -PI/2
  // Currently currentAngle places segment i at: currentAngle + i*ARC + ARC/2
  // We want: targetAngle + winner*ARC + ARC/2 = -PI/2 + 2PI*k
  // targetAngle = -PI/2 - winner*ARC - ARC/2 + 2PI*k

  const rawTarget = -Math.PI / 2 - winner * ARC - ARC / 2;
  // normalize so it's always a large positive spin from current
  let normalizedTarget = rawTarget;
  // Ensure we always spin forward (increase angle)
  while (normalizedTarget <= currentAngle + extraSpins - 2 * Math.PI) {
    normalizedTarget += 2 * Math.PI;
  }
  targetAngle = normalizedTarget + extraSpins;

  const startAngle = currentAngle;
  const duration = 4500 + Math.random() * 1000;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);
    currentAngle = startAngle + (targetAngle - startAngle) * eased;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle;
      spinning = false;
      showResult(winner);
    }
  }

  requestAnimationFrame(animate);
}

function showResult(index) {
  const seg = SEGMENTS[index];
  const overlay = document.getElementById('modalOverlay');
  const emojiEl = document.getElementById('modalEmoji');
  const titleEl = document.getElementById('modalTitle');
  const prizeEl = document.getElementById('modalPrize');
  const subEl = document.getElementById('modalSub');

  emojiEl.textContent = seg.emoji;
  prizeEl.className = 'modal-prize';

  if (seg.type === 'win') {
    titleEl.textContent = "🎉 You Won!";
    prizeEl.textContent = seg.short;
    subEl.textContent = "Show this screen to our team to claim your prize! 🎀";
    launchConfetti();
  } else if (seg.type === 'again') {
    titleEl.textContent = "Lucky You!";
    prizeEl.textContent = "Spin Again!";
    subEl.textContent = "You get another chance — go for it! 🌀";
  } else {
    titleEl.textContent = "Oh no!";
    prizeEl.textContent = seg.short;
    prizeEl.className = 'modal-prize consolation';
    subEl.textContent = "Don't worry — try again and win something amazing! 🌟";
  }

  overlay.classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';
  document.getElementById('spinBtn').disabled = false;
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#F9C200', '#1A3A6B', '#C5DFF0', '#4a9e7a', '#ffffff', '#ff6b9d'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const delay = Math.random() * 0.8;
    const size = 6 + Math.random() * 8;
    const isCircle = Math.random() > 0.5;
    piece.style.cssText = `
      left:${left}%;
      background:${color};
      width:${size}px;
      height:${size}px;
      border-radius:${isCircle ? '50%' : '2px'};
      animation-delay:${delay}s;
      animation-duration:${1.2 + Math.random() * 0.8}s;
    `;
    container.appendChild(piece);
  }
}

// Resize
window.addEventListener('resize', () => {
  SIZE = getWheelSize();
  canvas.width = SIZE;
  canvas.height = SIZE;
  drawWheel(currentAngle);
});
</script>
</body>
</html>
